name: Test PR
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
jobs:
  test:
    name: Test Changes
    strategy:
      fail-fast: true
      matrix:
        node:
          - 22
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate skill
        run: |
          test -f skill/SKILL.md || { echo "FAIL: skill/SKILL.md not found"; exit 1; }
          head -1 skill/SKILL.md | grep -q '^---$' || { echo "FAIL: missing frontmatter"; exit 1; }
          grep -q '^name:' skill/SKILL.md || { echo "FAIL: missing name field"; exit 1; }
          grep -q '^description:' skill/SKILL.md || { echo "FAIL: missing description field"; exit 1; }
          echo "Skill validation passed"
